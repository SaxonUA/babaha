<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WOT Platoon Tracker x3</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:transparent!important;
    font-family:'Segoe UI','Roboto','Arial',sans-serif;
    color:#fff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:12px;
    gap:24px;
}

.widget{
    width:min(1180px, 96vw);
    background:rgba(20,20,35,.55);
    backdrop-filter:blur(6px);
    border-radius:20px;
    padding:18px 24px;
    border:none;
    box-shadow:none;
    overflow:hidden;
}

.players-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
}

.player-card{
    background:rgba(15,15,30,.58);
    border-radius:18px;
    padding:18px;
    display:flex;
    flex-direction:column;
    min-height:100%;
}

.player-header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-bottom:18px;
}

.player-avatar{
    width:56px;
    height:56px;
    border-radius:50%;
    background:linear-gradient(135deg,#2a2a4a,#1a1a2e);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.6rem;
    color:#ffd166;
    border:1px solid rgba(255,255,255,.15);
    background-size:cover;
    background-position:center;
    flex-shrink:0;
}

.player-info h2{
    font-size:clamp(1.5rem,2.4vw,2.4rem);
    font-weight:900;
    white-space:nowrap;
}

.damage-section{
    text-align:center;
    margin:6px 0 14px;
}

.damage-label{
    font-size:1rem;
    color:#9be7d8;
    text-transform:uppercase;
    font-weight:900;
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:6px;
}

.damage-value{
    font-size:clamp(2.4rem,4vw,4.4rem);
    font-weight:900;
    color:#ff7a00;
    line-height:1;
}

.player-stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:auto;
    align-items:stretch;
}

.stat-item{
    background:rgba(10,10,25,.55);
    border-radius:14px;
    padding:14px 10px 12px;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:102px;
}

.stat-label{
    font-size:.9rem;
    color:#9be7d8;
    font-weight:800;
    display:flex;
    justify-content:center;
    gap:7px;
    text-transform:uppercase;
    margin-bottom:4px;
}

.stat-value{
    font-size:clamp(1.6rem,2.4vw,2.8rem);
    font-weight:900;
    color:#ffd166;
    line-height:1.1;
    margin-top:auto;
}

.platoon-stats{
    background:rgba(20,20,35,.55);
    border-radius:18px;
    padding:18px;
}

.platoon-stats h3{
    color:#06d6a0;
    margin-bottom:14px;
    display:flex;
    gap:8px;
    align-items:center;
    justify-content:center;
    font-size:1.25rem;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.stat-card{
    background:rgba(10,10,25,.55);
    border-radius:14px;
    padding:16px 10px;
    text-align:center;
}

.stat-card .value{
    font-size:clamp(1.6rem,2.5vw,2.5rem);
    font-weight:900;
    color:#ffd166;
}

.stat-card .label{
    font-size:.85rem;
    color:#cbd5e1;
    text-transform:uppercase;
    margin-top:3px;
}

@media (max-width: 980px){
    .players-container{grid-template-columns:1fr}
    .stats-grid{grid-template-columns:repeat(2,1fr)}
}

@media (max-width: 560px){
    .player-stats{grid-template-columns:1fr}
    .stats-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="widget">
    <div class="players-container">
        <div class="player-card">
            <div class="player-header">
                <div class="player-avatar" style="background-image:url('https://saxonua.github.io/site/logo.png')"></div>
                <div class="player-info"><h2>SaXon</h2></div>
            </div>

            <div class="damage-section">
                <div class="damage-label"><i class="fas fa-crosshairs"></i>Максимальний постріл</div>
                <div class="damage-value" id="p1_shot">0</div>
            </div>

            <div class="player-stats">
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-bolt"></i>Макс. шкода</div>
                    <div class="stat-value" id="p1_max_damage">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-skull"></i>Фраги</div>
                    <div class="stat-value" id="p1_total_frags">0</div>
                </div>
            </div>
        </div>

        <div class="player-card">
            <div class="player-header">
                <div class="player-avatar"><i class="fas fa-shield-halved"></i></div>
                <div class="player-info"><h2>Вірка</h2></div>
            </div>

            <div class="damage-section">
                <div class="damage-label"><i class="fas fa-crosshairs"></i>Максимальний постріл</div>
                <div class="damage-value" id="p2_shot">0</div>
            </div>

            <div class="player-stats">
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-bolt"></i>Макс. шкода</div>
                    <div class="stat-value" id="p2_max_damage">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-skull"></i>Фраги</div>
                    <div class="stat-value" id="p2_total_frags">0</div>
                </div>
            </div>
        </div>

        <div class="player-card">
            <div class="player-header">
                <div class="player-avatar"><i class="fas fa-shield-halved"></i></div>
                <div class="player-info"><h2>Yablochko</h2></div>
            </div>

            <div class="damage-section">
                <div class="damage-label"><i class="fas fa-crosshairs"></i>Максимальний постріл</div>
                <div class="damage-value" id="p3_shot">0</div>
            </div>

            <div class="player-stats">
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-bolt"></i>Макс. шкода</div>
                    <div class="stat-value" id="p3_max_damage">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><i class="fas fa-skull"></i>Фраги</div>
                    <div class="stat-value" id="p3_total_frags">0</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="widget">
    <div class="platoon-stats">
        <h3><i class="fas fa-users"></i> Статистика взводу</h3>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="total_battles">0</div>
                <div class="label">Бої</div>
            </div>
            <div class="stat-card">
                <div class="value" id="win_rate">0%</div>
                <div class="label">Winrate</div>
            </div>
            <div class="stat-card">
                <div class="value" id="total_damage">0</div>
                <div class="label">Загальна шкода</div>
            </div>
            <div class="stat-card">
                <div class="value" id="total_platoon_frags">0</div>
                <div class="label">К-ть фрагів</div>
            </div>
        </div>
    </div>
</div>

<script>
const SHEET_ID  = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";
const GID_STATS = "506446790";
const GID_SHOT  = "1090552989";

const URL_STATS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_STATS}`;
const URL_SHOT  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_SHOT}`;

function parseCSV(text){
    const rows = [];
    let row = [];
    let cell = "";
    let inQuotes = false;

    for(let i = 0; i < text.length; i++){
        const ch = text[i];
        const next = text[i + 1];

        if(ch === '"'){
            if(inQuotes && next === '"'){
                cell += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if(ch === ',' && !inQuotes){
            row.push(cell.trim());
            cell = "";
        } else if((ch === '\n' || ch === '\r') && !inQuotes){
            if(ch === '\r' && next === '\n') i++;
            row.push(cell.trim());
            cell = "";
            if(row.some(v => v !== "")) rows.push(row);
            row = [];
        } else {
            cell += ch;
        }
    }

    row.push(cell.trim());
    if(row.some(v => v !== "")) rows.push(row);

    return rows;
}

function num(v){
    const cleaned = String(v ?? "").replace(/[^\d-]/g, "");
    return cleaned ? parseInt(cleaned, 10) : 0;
}

function fmt(v){
    return (Number(v) || 0).toLocaleString("uk-UA");
}

function setText(id, value){
    const el = document.getElementById(id);
    if(el) el.textContent = value;
}

const COL = {
    dmgSaxon: 4,
    dmgVirka: 5,
    dmgYablochko: 6,
    fragSaxon: 7,
    fragVirka: 8,
    fragYablochko: 9,
    win: 11
};

async function loadShot(){
    try{
        const text = await (await fetch(URL_SHOT + "&_=" + Date.now())).text();
        const data = parseCSV(text);

        const row = data[1] || [];

        const shotSaxon = num(row[2]);
        const shotVirka = num(row[3]);
        const shotYablochko = num(row[4]);

        setText("p1_shot", fmt(shotSaxon));
        setText("p2_shot", fmt(shotVirka));
        setText("p3_shot", fmt(shotYablochko));

    }catch(err){
        console.error("loadShot error:", err);
    }
}

async function loadStats(){
    try{
        const text = await (await fetch(URL_STATS + "&_=" + Date.now())).text();
        const data = parseCSV(text);
        if(data.length < 2) return;

        let totalBattles = 0;
        let totalWins = 0;
        let totalDamage = 0;
        let totalFrags = 0;

        let maxDamageSaxon = 0;
        let maxDamageVirka = 0;
        let maxDamageYablochko = 0;

        let totalFragsSaxon = 0;
        let totalFragsVirka = 0;
        let totalFragsYablochko = 0;

        for(let i = 1; i < data.length; i++){
            const row = data[i];
            if(!row || row.length < 12) continue;

            const dmgSaxon = num(row[COL.dmgSaxon]);
            const dmgVirka = num(row[COL.dmgVirka]);
            const dmgYablochko = num(row[COL.dmgYablochko]);

            const fragSaxon = num(row[COL.fragSaxon]);
            const fragVirka = num(row[COL.fragVirka]);
            const fragYablochko = num(row[COL.fragYablochko]);

            const win = num(row[COL.win]);

            const rowHasData =
                dmgSaxon > 0 || dmgVirka > 0 || dmgYablochko > 0 ||
                fragSaxon > 0 || fragVirka > 0 || fragYablochko > 0;

            if(!rowHasData) continue;

            totalBattles++;
            if(win === 1) totalWins++;

            totalDamage += dmgSaxon + dmgVirka + dmgYablochko;
            totalFrags += fragSaxon + fragVirka + fragYablochko;

            totalFragsSaxon += fragSaxon;
            totalFragsVirka += fragVirka;
            totalFragsYablochko += fragYablochko;

            maxDamageSaxon = Math.max(maxDamageSaxon, dmgSaxon);
            maxDamageVirka = Math.max(maxDamageVirka, dmgVirka);
            maxDamageYablochko = Math.max(maxDamageYablochko, dmgYablochko);
        }

        setText("p1_max_damage", fmt(maxDamageSaxon));
        setText("p2_max_damage", fmt(maxDamageVirka));
        setText("p3_max_damage", fmt(maxDamageYablochko));

        setText("p1_total_frags", fmt(totalFragsSaxon));
        setText("p2_total_frags", fmt(totalFragsVirka));
        setText("p3_total_frags", fmt(totalFragsYablochko));

        setText("total_battles", fmt(totalBattles));
        setText("win_rate", totalBattles ? ((totalWins / totalBattles) * 100).toFixed(1) + "%" : "0%");
        setText("total_damage", fmt(totalDamage));
        setText("total_platoon_frags", fmt(totalFrags));

    }catch(err){
        console.error("loadStats error:", err);
    }
}

async function refresh(){
    await Promise.all([loadShot(), loadStats()]);
}

refresh();
setInterval(refresh, 5000);
</script>

</body>
</html>
