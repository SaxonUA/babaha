<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>FV4005 Stage II Max Damage Widget</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    background:transparent !important;
    font-family:'Segoe UI', Arial, sans-serif;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* === ОСНОВНИЙ ВІДЖЕТ — ФІКСОВАНИЙ РОЗМІР === */
.widget{
    width:960px;
    height:520px;
    position:relative;
    overflow:visible;
    border-radius:30px;
    background:linear-gradient(135deg, rgba(8,12,18,.82), rgba(16,22,30,.72));
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 18px 42px rgba(0,0,0,.42);
}

.widget::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
        radial-gradient(circle at 15% 18%, rgba(255,175,45,.12), transparent 30%),
        radial-gradient(circle at 72% 82%, rgba(0,255,210,.10), transparent 34%);
    z-index:1;
    border-radius:30px;
}

/* === КАРТИНКА ТАНКА ПОВЕРХ ТЕКСТУ === */
.tank-box{
    position:absolute;
    right:-70px;
    top:42px;
    width:760px;
    height:332px;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    overflow:visible;
}

.tank-image{
    width:120%;
    height:120%;
    object-fit:contain;
    object-position:center;

    /* Обрізає нижню тінь PNG, але не заважає танку виходити за рамки віджета */
    clip-path:inset(0 0 28px 0);

    filter:
        drop-shadow(0 14px 18px rgba(0,0,0,.36))
        saturate(1.08)
        contrast(1.06)
        brightness(1.03);
    opacity:.98;
}

/* М'яка тінь під самим танком всередині блоку */
.tank-box::after{
    content:"";
    position:absolute;
    left:18%;
    right:18%;
    bottom:46px;
    height:18px;
    background:rgba(0,0,0,.25);
    filter:blur(12px);
    border-radius:50%;
    z-index:-1;
}

/* === КОНТЕНТ === */
.content{
    position:relative;
    z-index:3;
    height:100%;
    padding:42px 36px 22px 36px;
    display:flex;
    flex-direction:column;
}

.top{
    display:flex;
    justify-content:flex-start;
    align-items:flex-start;
}

.tank-title{
    font-size:3.8rem;
    font-weight:1000;
    line-height:1;
    letter-spacing:1px;
    color:#ffffff;
    text-transform:uppercase;
    text-shadow:
        0 0 16px rgba(255,255,255,.18),
        0 4px 12px rgba(0,0,0,.35);
}

.main-info{
    width:500px;
}

.label{
    margin-top:26px;
    display:flex;
    align-items:center;
    gap:12px;
    font-size:1.4rem;
    font-weight:900;
    text-transform:uppercase;
    color:#93f2e8;
    letter-spacing:.6px;
    text-shadow:0 1px 6px rgba(0,0,0,.28);
}

.sword-icon{
    font-size:1.35rem;
    line-height:1;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    transform:translateY(-1px);
}

.max-damage{
    margin-top:12px;
    font-size:6.9rem;
    font-weight:1000;
    line-height:.92;
    color:#ff8a00;
    text-shadow:
        0 0 28px rgba(255,132,0,.24),
        0 6px 16px rgba(0,0,0,.30);
}

/* === НАЙКРАЩИЙ ПОСТРІЛ === */
.best-shot-box{
    margin-top:14px;
    margin-left:22px;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
}

.best-shot-text{
    display:flex;
    align-items:center;
    gap:9px;
    font-size:1.12rem;
    font-weight:900;
    text-transform:uppercase;
    color:#8feee4;
    letter-spacing:.4px;
    text-shadow:0 1px 5px rgba(0,0,0,.28);
}

.best-shot-value{
    margin-top:5px;
    margin-left:34px;
    font-size:3.55rem;
    font-weight:1000;
    line-height:1;
    color:#ffe07a;
    text-shadow:
        0 0 18px rgba(255,211,92,.18),
        0 4px 12px rgba(0,0,0,.28);
}

.spacer{
    height:4px;
}

/* === НИЖНІ КАРТКИ === */
.stats{
    margin-top:auto;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
    position:relative;
    z-index:6;
}

.stat-card{
    background:linear-gradient(180deg, rgba(72,80,93,.88), rgba(48,56,68,.88));
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:10px 12px 9px;
    text-align:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    min-height:86px;
}

.stat-value{
    font-size:2.25rem;
    font-weight:1000;
    line-height:.95;
    color:#ffd65e;
    text-shadow:0 3px 8px rgba(0,0,0,.22);
}

.stat-value.win{
    color:#10f0c7;
}

.stat-label{
    margin-top:5px;
    font-size:.86rem;
    font-weight:900;
    color:#f1f5fb;
    text-transform:uppercase;
    text-shadow:0 1px 4px rgba(0,0,0,.22);
}
</style>
</head>

<body>

<div class="widget">

    <div class="tank-box">
        <img
            class="tank-image"
            src="https://static.encyclopedia.warthunder.com/images/uk_fv4005.png"
            alt="FV4005 Stage II"
        >
    </div>

    <div class="content">
        <div class="top">
            <div class="tank-title">FV4005 Stage II</div>
        </div>

        <div class="main-info">
            <div class="label">
                <span class="sword-icon">⚔️</span>
                <span>Максимальний дамаг</span>
            </div>

            <div class="max-damage" id="maxDamage">0</div>

            <div class="best-shot-box">
                <div class="best-shot-text">
                    <i class="fas fa-crosshairs"></i>
                    <span>Найкращий постріл</span>
                </div>
                <div class="best-shot-value" id="bestShot">0</div>
            </div>

            <div class="spacer"></div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="battleCount">0</div>
                <div class="stat-label">Бої</div>
            </div>

            <div class="stat-card">
                <div class="stat-value win" id="winRate">0%</div>
                <div class="stat-label">Перемоги</div>
            </div>

            <div class="stat-card">
                <div class="stat-value" id="avgDamage">0</div>
                <div class="stat-label">Середній урон</div>
            </div>
        </div>
    </div>
</div>

<script>
const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";

const GID_MAIN = "0";
const SHEET_SHOT = "БАБАХА ДАМАГ";
const SHOT_CELL = "C3";

const CSV_URL_MAIN = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_MAIN}`;
const CSV_URL_SHOT = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_SHOT)}&range=${SHOT_CELL}`;

const maxDamageEl = document.getElementById("maxDamage");
const battleCountEl = document.getElementById("battleCount");
const winRateEl = document.getElementById("winRate");
const avgDamageEl = document.getElementById("avgDamage");
const bestShotEl = document.getElementById("bestShot");

function parseCSV(text){
    const rows = [];
    let row = [];
    let cell = "";
    let insideQuotes = false;

    for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"' && insideQuotes && next === '"'){
            cell += '"';
            i++;
        }else if(char === '"'){
            insideQuotes = !insideQuotes;
        }else if(char === ',' && !insideQuotes){
            row.push(cell);
            cell = "";
        }else if((char === '\n' || char === '\r') && !insideQuotes){
            if(cell !== "" || row.length > 0){
                row.push(cell);
                rows.push(row);
                row = [];
                cell = "";
            }
            if(char === '\r' && next === '\n') i++;
        }else{
            cell += char;
        }
    }

    if(cell !== "" || row.length > 0){
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

function toNumber(value){
    return Number(
        String(value || "")
            .replace(/\s/g, "")
            .replace(",", ".")
            .replace(/[^\d.]/g, "")
    ) || 0;
}

function isWin(value){
    const text = String(value || "").toLowerCase();

    return (
        text.includes("перемога") ||
        text.includes("победа") ||
        text.includes("win") ||
        text.includes("victory") ||
        text.includes("✅")
    );
}

function formatNumber(num){
    return Math.round(num).toLocaleString("uk-UA");
}

async function loadMainData(){
    try{
        const response = await fetch(CSV_URL_MAIN + "&_=" + Date.now(), {
            cache:"no-store"
        });

        if(!response.ok){
            throw new Error("Не вдалося отримати CSV з Аркуш1");
        }

        const text = await response.text();
        const rows = parseCSV(text);

        let battleCount = 0;
        let wins = 0;
        let totalDamage = 0;
        let maxDamage = 0;

        for(let i = 1; i < rows.length; i++){
            const row = rows[i];

            if(!row || row.length < 8) continue;

            const damage = toNumber(row[4]);
            const result = row[7] || "";

            if(damage <= 0) continue;

            battleCount++;
            totalDamage += damage;

            if(isWin(result)){
                wins++;
            }

            if(damage > maxDamage){
                maxDamage = damage;
            }
        }

        const winRate = battleCount > 0 ? (wins / battleCount) * 100 : 0;
        const avgDamage = battleCount > 0 ? totalDamage / battleCount : 0;

        maxDamageEl.textContent = formatNumber(maxDamage);
        battleCountEl.textContent = battleCount;
        winRateEl.textContent = winRate.toFixed(1) + "%";
        avgDamageEl.textContent = formatNumber(avgDamage);

    }catch(error){
        console.error(error);

        maxDamageEl.textContent = "0";
        battleCountEl.textContent = "0";
        winRateEl.textContent = "0%";
        avgDamageEl.textContent = "0";
    }
}

async function loadBestShot(){
    try{
        const response = await fetch(CSV_URL_SHOT + "&_=" + Date.now(), {
            cache:"no-store"
        });

        if(!response.ok){
            throw new Error("Не вдалося отримати значення найкращого пострілу");
        }

        const text = await response.text();
        const rows = parseCSV(text);

        const value = rows?.[0]?.[0] || "0";
        const bestShot = toNumber(value);

        bestShotEl.textContent = formatNumber(bestShot);

    }catch(error){
        console.error(error);
        bestShotEl.textContent = "0";
    }
}

function loadAll(){
    loadMainData();
    loadBestShot();
}

loadAll();
setInterval(loadAll, 10000);
</script>

</body>
</html>
