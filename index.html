<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FV4005 Stage II Max Damage Widget</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    background:transparent !important;
    font-family:'Segoe UI', Arial, sans-serif;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.widget{
    width:960px;
    height:520px;
    position:relative;
    overflow:hidden;
    border-radius:30px;
    background:
        radial-gradient(circle at 13% 20%, rgba(255,190,70,.22), transparent 30%),
        radial-gradient(circle at 76% 82%, rgba(0,255,210,.14), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(235,242,240,.93));
    border:1px solid rgba(255,255,255,.9);
    box-shadow:0 18px 42px rgba(0,0,0,.28);
}

/* === КАРТИНКА ТАНКА СПРАВА === */
.tank-box{
    position:absolute;
    right:10px;
    top:128px;
    width:450px;
    height:195px;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
}

.tank-image{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    filter:
        drop-shadow(0 10px 12px rgba(0,0,0,.22))
        saturate(1.08)
        contrast(1.04);
    opacity:.98;
}

.tank-box::after{
    content:"";
    position:absolute;
    left:12%;
    right:12%;
    bottom:4px;
    height:18px;
    background:rgba(0,0,0,.18);
    filter:blur(14px);
    border-radius:50%;
    z-index:-1;
}

.content{
    position:relative;
    z-index:3;
    height:100%;
    padding:42px 36px 28px 36px;
    display:flex;
    flex-direction:column;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
}

.tank-title{
    font-size:3.8rem;
    font-weight:1000;
    line-height:1;
    letter-spacing:1px;
    color:#ffd35c;
    text-transform:uppercase;
    text-shadow:0 0 18px rgba(255,180,0,.14);
}

.badge{
    flex-shrink:0;
    padding:10px 18px;
    border-radius:999px;
    font-size:1rem;
    font-weight:900;
    color:#ffb24a;
    border:1px solid rgba(255,140,0,.55);
    background:rgba(255,140,0,.08);
    text-transform:uppercase;
    margin-top:2px;
}

.main-info{
    width:500px;
}

.label{
    margin-top:26px;
    display:flex;
    align-items:center;
    gap:12px;
    font-size:1.4rem;
    font-weight:900;
    text-transform:uppercase;
    color:#89e8df;
    letter-spacing:.6px;
}

.max-damage{
    margin-top:12px;
    font-size:6.9rem;
    font-weight:1000;
    line-height:.92;
    color:#ff8400;
    text-shadow:0 0 28px rgba(255,132,0,.24);
}

/* === НАЙКРАЩИЙ ПОСТРІЛ — ЧИСЛО ПІД НАПИСОМ === */
.best-shot-box{
    margin-top:14px;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
}

.best-shot-text{
    display:flex;
    align-items:center;
    gap:9px;
    font-size:1.12rem;
    font-weight:900;
    text-transform:uppercase;
    color:#89e8df;
    letter-spacing:.4px;
}

.best-shot-value{
    margin-top:5px;
    margin-left:34px;
    font-size:3.55rem;
    font-weight:1000;
    line-height:1;
    color:#ffd35c;
    text-shadow:0 0 18px rgba(255,211,92,.25);
}

.spacer{
    height:4px;
}

.stats{
    margin-top:auto;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
}

.stat-card{
    background:linear-gradient(180deg, rgba(48,54,65,.82), rgba(36,44,54,.84));
    border:1px solid rgba(255,255,255,.12);
    border-radius:22px;
    padding:18px 12px 16px;
    text-align:center;
    box-shadow:none;
}

.stat-value{
    font-size:2.7rem;
    font-weight:1000;
    line-height:1;
    color:#ffd35c;
}

.stat-value.win{
    color:#00f0c0;
}

.stat-label{
    margin-top:8px;
    font-size:1rem;
    font-weight:900;
    color:#d5dcea;
    text-transform:uppercase;
}

@media (max-width:980px){
    .widget{
        width:940px;
        height:510px;
    }

    .tank-box{
        right:8px;
        top:126px;
        width:430px;
        height:186px;
    }

    .tank-title{
        font-size:3.3rem;
    }

    .max-damage{
        font-size:6.4rem;
    }

    .best-shot-value{
        font-size:2.35rem;
    }
}
</style>
</head>

<body>

<div class="widget">

    <div class="tank-box">
        <img
            class="tank-image"
            src="https://static.encyclopedia.warthunder.com/images/uk_fv4005.png"
            alt="FV4005 Stage II"
        >
    </div>

    <div class="content">
        <div class="top">
            <div class="tank-title">FV4005 Stage II</div>
            <div class="badge">Max Damage</div>
        </div>

        <div class="main-info">
            <div class="label">
                <i class="fas fa-crosshairs"></i>
                <span>Максимальний дамаг за бій</span>
            </div>

            <div class="max-damage" id="maxDamage">0</div>

            <div class="best-shot-box">
                <div class="best-shot-text">
                    <i class="fas fa-bullseye"></i>
                    <span>Найкращий постріл</span>
                </div>
                <div class="best-shot-value" id="bestShot">0</div>
            </div>

            <div class="spacer"></div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="battleCount">0</div>
                <div class="stat-label">Бої</div>
            </div>

            <div class="stat-card">
                <div class="stat-value win" id="winRate">0%</div>
                <div class="stat-label">Перемоги</div>
            </div>

            <div class="stat-card">
                <div class="stat-value" id="avgDamage">0</div>
                <div class="stat-label">Середній урон</div>
            </div>
        </div>
    </div>
</div>

<script>
const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";

const GID_MAIN = "0";
const SHEET_SHOT = "YKP2";
const SHOT_CELL = "D2";

const CSV_URL_MAIN = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_MAIN}`;
const CSV_URL_SHOT = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_SHOT)}&range=${SHOT_CELL}`;

const maxDamageEl = document.getElementById("maxDamage");
const battleCountEl = document.getElementById("battleCount");
const winRateEl = document.getElementById("winRate");
const avgDamageEl = document.getElementById("avgDamage");
const bestShotEl = document.getElementById("bestShot");

function parseCSV(text){
    const rows = [];
    let row = [];
    let cell = "";
    let insideQuotes = false;

    for(let i = 0; i < text.length; i++){
        const char = text[i];
        const next = text[i + 1];

        if(char === '"' && insideQuotes && next === '"'){
            cell += '"';
            i++;
        }else if(char === '"'){
            insideQuotes = !insideQuotes;
        }else if(char === ',' && !insideQuotes){
            row.push(cell);
            cell = "";
        }else if((char === '\n' || char === '\r') && !insideQuotes){
            if(cell !== "" || row.length > 0){
                row.push(cell);
                rows.push(row);
                row = [];
                cell = "";
            }
            if(char === '\r' && next === '\n') i++;
        }else{
            cell += char;
        }
    }

    if(cell !== "" || row.length > 0){
        row.push(cell);
        rows.push(row);
    }

    return rows;
}

function toNumber(value){
    return Number(
        String(value || "")
            .replace(/\s/g, "")
            .replace(",", ".")
            .replace(/[^\d.]/g, "")
    ) || 0;
}

function isWin(value){
    const text = String(value || "").toLowerCase();

    return (
        text.includes("перемога") ||
        text.includes("победа") ||
        text.includes("win") ||
        text.includes("victory") ||
        text.includes("✅")
    );
}

function formatNumber(num){
    return Math.round(num).toLocaleString("uk-UA");
}

async function loadMainData(){
    try{
        const response = await fetch(CSV_URL_MAIN + "&_=" + Date.now(), {
            cache:"no-store"
        });

        if(!response.ok){
            throw new Error("Не вдалося отримати CSV з Аркуш1");
        }

        const text = await response.text();
        const rows = parseCSV(text);

        let battleCount = 0;
        let wins = 0;
        let totalDamage = 0;
        let maxDamage = 0;

        for(let i = 1; i < rows.length; i++){
            const row = rows[i];

            if(!row || row.length < 8) continue;

            const damage = toNumber(row[4]);
            const result = row[7] || "";

            if(damage <= 0) continue;

            battleCount++;
            totalDamage += damage;

            if(isWin(result)){
                wins++;
            }

            if(damage > maxDamage){
                maxDamage = damage;
            }
        }

        const winRate = battleCount > 0 ? (wins / battleCount) * 100 : 0;
        const avgDamage = battleCount > 0 ? totalDamage / battleCount : 0;

        maxDamageEl.textContent = formatNumber(maxDamage);
        battleCountEl.textContent = battleCount;
        winRateEl.textContent = winRate.toFixed(1) + "%";
        avgDamageEl.textContent = formatNumber(avgDamage);

    }catch(error){
        console.error(error);

        maxDamageEl.textContent = "0";
        battleCountEl.textContent = "0";
        winRateEl.textContent = "0%";
        avgDamageEl.textContent = "0";
    }
}

async function loadBestShot(){
    try{
        const response = await fetch(CSV_URL_SHOT + "&_=" + Date.now(), {
            cache:"no-store"
        });

        if(!response.ok){
            throw new Error("Не вдалося отримати D2 з YKP2");
        }

        const text = await response.text();
        const rows = parseCSV(text);

        const value = rows?.[0]?.[0] || "0";
        const bestShot = toNumber(value);

        bestShotEl.textContent = formatNumber(bestShot);

    }catch(error){
        console.error(error);
        bestShotEl.textContent = "0";
    }
}

function loadAll(){
    loadMainData();
    loadBestShot();
}

loadAll();
setInterval(loadAll, 10000);
</script>

</body>
</html>
